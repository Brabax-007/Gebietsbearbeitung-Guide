<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gebietsbearbeitung Guide</title>
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;background:#f5f5f7;color:#111}
    header{padding:14px 14px 10px;background:#fff;border-bottom:1px solid #e5e5ea;position:sticky;top:0}
    h1{font-size:18px;margin:0 0 10px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .seg{display:flex;gap:6px;flex-wrap:wrap}
    .seg button{border:1px solid #d1d1d6;background:#fff;padding:8px 10px;border-radius:10px}
    .seg button.active{background:#111;color:#fff;border-color:#111}
    .search{flex:1;min-width:220px}
    input{width:100%;padding:10px 12px;border:1px solid #d1d1d6;border-radius:10px;font-size:16px}
    main{padding:12px}
    .card{background:#fff;border:1px solid #e5e5ea;border-radius:14px;padding:12px;margin:10px 0}
    .card h2{font-size:16px;margin:0 0 8px}
    .muted{color:#666;font-size:13px;margin:0 0 8px}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .btn{border:1px solid #d1d1d6;background:#fff;padding:8px 10px;border-radius:10px}
    textarea{width:100%;min-height:70px;border:1px solid #d1d1d6;border-radius:10px;padding:10px;font-size:15px}
    .star{float:right;border:none;background:transparent;font-size:18px}
    .small{font-size:12px;color:#666}
  </style>
</head>
<body>
<header>
  <h1>Gebietsbearbeitung Guide</h1>
  <div class="row">
    <div class="seg" id="seg"></div>
    <div class="search"><input id="q" placeholder="Suche, z.B. Skoda, Termin, Keine Zeit" /></div>
    <button class="btn" id="favToggle">Nur Favoriten</button>
  </div>
  <p class="small">Offline nutzbar nach dem ersten Öffnen. Notizen und Favoriten bleiben auf dem iPhone gespeichert.</p>
</header>

<main id="app"></main>

<script>
const SCENARIOS = [
  {id:"gatekeeper", name:"Einlass Zentrale Sekretariat"},
  {id:"decision", name:"Entscheider"},
  {id:"phone", name:"Telefon"}
];

const SCRIPTS = [
  {id:"g1", scenario:"gatekeeper", title:"Einstieg sachlich professionell",
   text:"Guten Tag, mein Name ist Volker Alt vom Autohaus Elitzsch. Ich betreue Unternehmen in der Region im Bereich gewerbliche Fahrzeuge mit Schwerpunkt Skoda. Ich würde mich gern kurz dem zuständigen Ansprechpartner für Firmenfahrzeuge oder Mobilität vorstellen. Wer ist bei Ihnen dafür verantwortlich?",
   tags:["skoda","vorstellung","regional"]},
  {id:"g2", scenario:"gatekeeper", title:"Einstieg mit Besonderheit Sachsen",
   text:"Guten Tag, Volker Alt vom Autohaus Elitzsch. Wir sind das einzige sächsische Autohaus, das alle Marken des Volkswagen Konzerns anbietet. Ich betreue Firmen in dieser Region und möchte mich dem zuständigen Ansprechpartner kurz als regionaler Ansprechpartner vorstellen. An wen darf ich mich wenden?",
   tags:["alle marken","sachsen","vw konzern"]},
  {id:"g3", scenario:"gatekeeper", title:"Wenn nach Termin gefragt wird",
   text:"Nein, ich bin heute bewusst im Außendienst unterwegs, um mich persönlich vorzustellen. Es geht nicht um ein konkretes Angebot, sondern um einen kurzen Austausch von 15 bis 20 Minuten, damit Ihr Haus weiß, wer Ihr Ansprechpartner für Skoda und die weiteren Volkswagen Marken ist.",
   tags:["kein termin","kurz","terminziel"]},
  {id:"g4", scenario:"gatekeeper", title:"Wenn blockiert wird Keine Zeit",
   text:"Das verstehe ich. Mir geht es heute nur um eine kurze persönliche Vorstellung und die Vereinbarung eines festen Termins. Wann passt es Herrn Müller erfahrungsgemäß am besten?",
   tags:["block","termin","zeitpunkt"]},
  {id:"d1", scenario:"decision", title:"Kurzansprache vor Ort",
   text:"Herr Müller, schön Sie kurz zu treffen. Ich betreue Firmen in der Region mit Schwerpunkt Skoda. Als einziges sächsisches Autohaus bieten wir alle Volkswagen Konzernmarken aus einer Hand. Ich möchte Sie nicht aufhalten, mir geht es um einen strukturierten Austausch von 20 Minuten. Wann passt es Ihnen diese oder nächste Woche besser?",
   tags:["skoda","alle marken","termin"]},
  {id:"p1", scenario:"phone", title:"30 Sekunden Entscheider am Telefon",
   text:"Herr Müller, Volker Alt vom Autohaus Elitzsch. Ich betreue Firmen in Ihrer Region mit Schwerpunkt Skoda. Als einziges sächsisches Haus bieten wir alle Volkswagen Konzernmarken aus einer Hand. Ich möchte mich kurz persönlich als Ansprechpartner vorstellen. 20 Minuten reichen. Passt es eher Dienstag oder Donnerstag?",
   tags:["telefon","kurz","termin"]}
];

const OBJECTIONS = [
  {id:"o1", objection:"Wir sind versorgt", variants:[
    "Das ist in Ordnung. Genau dann geht es nicht um Ersatz, sondern um Optimierung. Lassen Sie uns 20 Minuten prüfen, ob wir punktuell Mehrwert bieten können.",
    "Freut mich, dann läuft es bei Ihnen. Ich möchte nichts ablösen, sondern mich als zusätzliche Option vorstellen. Ein kurzer Termin reicht, damit Sie mich einordnen können.",
    "Perfekt. Ein zweiter Ansprechpartner im Hintergrund ist oft strategisch sinnvoll. Darf ich mich kurz persönlich vorstellen, damit Sie im Bedarfsfall eine Alternative kennen?"
  ], tags:["termin","einwand"]},
  {id:"o2", objection:"Wir haben feste Partner", variants:[
    "Das ist ein gutes Zeichen für Verlässlichkeit. Ich möchte Ihre Struktur nicht stören, sondern mich ergänzend positionieren. Ein kurzer Termin schafft Transparenz.",
    "Feste Partner sind wichtig. Viele Firmen prüfen dennoch regelmäßig Konditionen, Verfügbarkeit und Service. Ein kurzer Vergleich kostet wenig Zeit, kann aber Vorteile bringen.",
    "Verstehe ich. Was ist Ihnen an Ihrem Partner am wichtigsten? Genau dort setzen wir an. Lassen Sie uns das kurz persönlich abgleichen."
  ], tags:["partner","vergleich","termin"]},
  {id:"o3", objection:"Kein Interesse", variants:[
    "Verstanden. Genau deshalb schlage ich ein kurzes Kennenlernen vor, damit Sie überhaupt bewerten können, ob es für Sie relevant ist.",
    "Kein Interesse woran genau, an einem weiteren Ansprechpartner oder grundsätzlich an dem Thema? Wenn ich das weiß, halte ich es für Sie maximal kurz.",
    "Das respektiere ich. 15 Minuten Kennenlernen, und wenn Sie danach keinen Mehrwert sehen, lasse ich Sie in Ruhe. Fair?"
  ], tags:["kurz","deal","termin"]}
];

const LS_FAV = "gbg_favorites_v1";
const LS_NOTES = "gbg_notes_v1";
const LS_SCEN = "gbg_scenario_v1";
const LS_ONLYFAV = "gbg_onlyfav_v1";

let state = {
  scen: localStorage.getItem(LS_SCEN) || "gatekeeper",
  q: "",
  onlyFav: (localStorage.getItem(LS_ONLYFAV) || "0") === "1",
  fav: new Set(JSON.parse(localStorage.getItem(LS_FAV) || "[]")),
  notes: JSON.parse(localStorage.getItem(LS_NOTES) || "{}")
};

function save() {
  localStorage.setItem(LS_SCEN, state.scen);
  localStorage.setItem(LS_ONLYFAV, state.onlyFav ? "1" : "0");
  localStorage.setItem(LS_FAV, JSON.stringify([...state.fav]));
  localStorage.setItem(LS_NOTES, JSON.stringify(state.notes));
}

function matches(item, q) {
  if (!q) return true;
  q = q.toLowerCase();
  return (item.title && item.title.toLowerCase().includes(q)) ||
         (item.text && item.text.toLowerCase().includes(q)) ||
         (item.objection && item.objection.toLowerCase().includes(q)) ||
         (item.variants && item.variants.join(" ").toLowerCase().includes(q)) ||
         (item.tags && item.tags.join(" ").toLowerCase().includes(q));
}

function copyText(t) { navigator.clipboard.writeText(t); alert("Kopiert"); }
async function shareText(t) {
  if (navigator.share) { await navigator.share({text:t}); }
  else { copyText(t); }
}

function renderSeg() {
  const el = document.getElementById("seg");
  el.innerHTML = "";
  SCENARIOS.forEach(s => {
    const b = document.createElement("button");
    b.textContent = s.name;
    b.className = state.scen === s.id ? "active" : "";
    b.onclick = () => { state.scen = s.id; save(); render(); };
    el.appendChild(b);
  });
}

function cardScript(item) {
  const isFav = state.fav.has(item.id);
  const note = state.notes[item.id] || "";
  return `
    <div class="card">
      <button class="star" data-fav="${item.id}" title="Favorit">${isFav ? "★" : "☆"}</button>
      <h2>${item.title}</h2>
      <p>${item.text}</p>
      <div class="btns">
        <button class="btn" data-copy="${encodeURIComponent(item.text)}">Kopieren</button>
        <button class="btn" data-share="${encodeURIComponent(item.text)}">Teilen</button>
      </div>
      <p class="muted">Notiz</p>
      <textarea data-note="${item.id}" placeholder="z.B. Ansprechpartner, Zeitpunkt, nächster Schritt">${note}</textarea>
    </div>
  `;
}

function cardObjection(o) {
  const v = o.variants.map((t, i) => `
    <div class="card" style="border:none; padding:0; margin:10px 0 0">
      <p class="muted">Variante ${i+1}</p>
      <p>${t}</p>
      <div class="btns">
        <button class="btn" data-copy="${encodeURIComponent(t)}">Kopieren</button>
        <button class="btn" data-share="${encodeURIComponent(t)}">Teilen</button>
      </div>
    </div>
  `).join("");
  return `
    <div class="card">
      <h2>${o.objection}</h2>
      ${v}
    </div>
  `;
}

function render() {
  renderSeg();

  const q = state.q.trim();
  const scripts = SCRIPTS
    .filter(s => s.scenario === state.scen)
    .filter(s => matches(s, q))
    .filter(s => !state.onlyFav || state.fav.has(s.id));

  const objections = OBJECTIONS
    .filter(o => matches(o, q));

  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="card">
      <h2>Skripte</h2>
      <p class="muted">Für ${SCENARIOS.find(x=>x.id===state.scen).name}</p>
      ${scripts.length ? scripts.map(cardScript).join("") : "<p>Keine Treffer</p>"}
    </div>
    <div class="card">
      <h2>Einwände mit drei Antworten</h2>
      ${objections.length ? objections.map(cardObjection).join("") : "<p>Keine Treffer</p>"}
    </div>
  `;

  document.querySelectorAll("[data-fav]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-fav");
      if (state.fav.has(id)) state.fav.delete(id); else state.fav.add(id);
      save(); render();
    });
  });

  document.querySelectorAll("[data-copy]").forEach(btn => {
    btn.addEventListener("click", () => copyText(decodeURIComponent(btn.getAttribute("data-copy"))));
  });

  document.querySelectorAll("[data-share]").forEach(btn => {
    btn.addEventListener("click", () => shareText(decodeURIComponent(btn.getAttribute("data-share"))));
  });

  document.querySelectorAll("textarea[data-note]").forEach(t => {
    t.addEventListener("input", () => {
      const id = t.getAttribute("data-note");
      state.notes[id] = t.value;
      save();
    });
  });

  document.getElementById("favToggle").textContent = state.onlyFav ? "Alle anzeigen" : "Nur Favoriten";
}

document.getElementById("q").addEventListener("input", (e) => { state.q = e.target.value; render(); });
document.getElementById("favToggle").addEventListener("click", () => { state.onlyFav = !state.onlyFav; save(); render(); });

render();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
}
</script>
</body>
</html>
